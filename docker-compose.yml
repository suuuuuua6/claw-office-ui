services:
  claw-office:
    build: .
    container_name: claw-office
    ports:
      - "19000:19000"
    volumes:
      # 配置文件（可编辑）
      - ./agents-config.json:/app/agents-config.json
      # 状态持久化
      - ./agents-state.json:/app/agents-state.json
      - ./state.json:/app/state.json
      # 资产文件（可选，用于保存自定义资产）
      - ./assets:/app/assets
      # 前端（可选，用于自定义前端）
      - ./frontend:/app/frontend
    environment:
      - STAR_BACKEND_PORT=19000
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-star-office-dev-secret-change-in-prod}
      - ASSET_DRAWER_PASS=${ASSET_DRAWER_PASS:-1234}
    restart: unless-stopped
    networks:
      - claw-office-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  claw-office-net:
    name: claw-office-net
    external: true
