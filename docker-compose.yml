services:
  claw-office:
    build: .
    container_name: claw-office
    ports:
      - "19000:19000"
    volumes:
      # 配置文件（可编辑）
      - ./agents-config.json:/app/agents-config.json
    environment:
      - STAR_BACKEND_PORT=19000
      - CLAW_OFFICE_SECRET=${CLAW_OFFICE_SECRET:-z5wKkskblzdjdQSR-ThM0nOa-IYCvXoqo4PwsxereU}
      - ASSET_DRAWER_PASS=${ASSET_DRAWER_PASS:-1234}
    restart: unless-stopped
    networks:
      - yiagent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  yiagent-net:
    external: true
